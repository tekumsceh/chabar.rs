# Nginx site for IO Organize on Hostinger KVM VPS
#
# Copy to: /etc/nginx/sites-available/ioorganize
# Enable:  sudo ln -sf /etc/nginx/sites-available/ioorganize /etc/nginx/sites-enabled/
# Test:    sudo nginx -t && sudo systemctl reload nginx
# SSL:     sudo certbot --nginx -d chabar.rs -d www.chabar.rs
#
# IMPORTANT: www must 301 to apex. Google OAuth PKCE stores a verifier in
# localStorage per-origin — www vs chabar.rs breaks login (lands back on login).

# Force apex host (preserve query string for OAuth ?code=)
server {
    listen 80;
    listen [::]:80;
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.chabar.rs;

    # Certbot manages certificate paths when using --nginx
    # ssl_certificate /etc/letsencrypt/live/chabar.rs/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/chabar.rs/privkey.pem;

    return 301 https://chabar.rs$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name chabar.rs;

    root /var/www/ioorganize/dist;
    index index.html;

    client_max_body_size 1m;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location ~ /\. {
        deny all;
    }
}
